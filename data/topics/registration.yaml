body: |
  Использование беспилотников регулируется законодательством. Требования зависят от страны, массы дрона и целей использования.

  *📌 Что обычно регулируется:*
  • Постановка на государственный учёт дронов тяжелее установленного порога
  • Уведомление органов управления воздушным движением перед полётом в ряде зон
  • Ограничения по высоте и расстоянию от аэродромов
  • Требования к страхованию (в ряде стран обязательное)
  • Правила съёмки и обработки изображений / видео

  *🇷🇺 В России:*
  Дроны массой более 250 г подлежат постановке на государственный учёт через портал Госуслуги. После регистрации присваивается учётный номер, который наносится на корпус. Уточняй актуальные пороговые значения и процедуры у Росавиации — требования могут меняться.

  *⚠️ Ответственность за нарушения:*
  — Предупреждение или штраф
  — Конфискация воздушного судна
  — Административная ответственность
  — В особых случаях — уголовная ответственность

  *💼 Коммерческое использование:*
  Для коммерческих полётов (аэрофотосъёмка за плату, доставка) требования значительно строже. Как правило, нужны дополнительные разрешения и сертификация.
disclaimer: "Это справочная информация, не юридическая консультация. Законодательство в области БВС регулярно меняется. Уточняй актуальные требования на сайте Росавиации (favt.gov.ru) и Госуслугах, либо у регулятора своей страны."
