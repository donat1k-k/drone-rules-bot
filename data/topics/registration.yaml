id: registration
title: "📋 Регистрация и закон"
body: |
  Использование беспилотников регулируется законодательством. Требования зависят от страны, массы дрона и целей использования.

  *Что обычно регулируется:*
  • Постановка на государственный учёт дронов, превышающих установленную массу
  • Уведомление органов управления воздушным движением перед полётом в ряде зон
  • Ограничения по высоте, расстоянию от аэродромов и скоплений людей
  • Требования к страхованию (в ряде стран обязательное)
  • Правила съёмки и обработки полученных изображений / видео

  *В России:*
  Дроны массой более 250 г подлежат постановке на государственный учёт через портал Госуслуги. После регистрации присваивается учётный номер, который наносится на корпус. Уточняй актуальные пороговые значения и процедуры у Росавиации.

  *Ответственность за нарушения:*
  — Предупреждение или штраф
  — Конфискация воздушного судна
  — Административная ответственность
  — В особых случаях — уголовная ответственность

  *Коммерческое использование:*
  Для коммерческих полётов (аэрофотосъёмка за плату, доставка и т.п.) требования значительно строже. Как правило, нужны дополнительные разрешения и сертификация.

  *Страхование:*
  Рекомендуется оформить страховку гражданской ответственности — она покроет ущерб третьим лицам при аварии.
disclaimer: "Это справочная информация, не юридическая консультация. Законодательство в области БВС регулярно меняется. Уточняй актуальные требования на сайте Росавиации (favt.gov.ru) и Госуслугах, либо у регулятора своей страны."
