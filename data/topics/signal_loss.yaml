id: signal_loss
title: "📶 Потеря сигнала"
body: |
  Потеря связи с дроном — нештатная ситуация, к которой нужно быть готовым заранее.

  *Что происходит автоматически:*
  Большинство современных дронов при потере сигнала активируют режим Return to Home (RTH): поднимаются на заданную высоту и летят к точке взлёта. Это поведение настраивается до полёта — обязательно проверь настройки.

  *Что делать немедленно:*
  1. Не паникуй — резкие движения стиками не помогут, пока связи нет
  2. Проверь, не выключился ли пульт или телефон с приложением
  3. Оставайся на месте взлёта — дрон летит именно туда
  4. Следи за телеметрией в приложении — она может сохраняться дольше, чем управление
  5. Если дрон возвращается — не мешай, но будь готов взять управление при восстановлении связи

  *Профилактика:*
  • Настрой высоту RTH выше всех препятствий в радиусе полёта
  • Убедись, что Home Point установлен верно перед каждым взлётом
  • Не летай за зданиями и металлоконструкциями — они глушат сигнал
  • Держи запас дальности: не летай на пределе зоны покрытия
  • Следи за индикатором качества сигнала в приложении

  *Если дрон не вернулся:*
  • Зафиксируй последние координаты из телеметрии
  • Запиши время и обстоятельства инцидента
  • При падении на чужую территорию или дорогу — сообщи в соответствующие службы
