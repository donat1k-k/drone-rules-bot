body: |
  Безопасность полёта — ответственность пилота. Соблюдай эти правила на каждом вылете.

  *🎯 Основные принципы:*
  • Держи дрон в прямой видимости — это обязательное требование
  • Не летай над скоплениями людей: концертами, рынками, очередями
  • Не летай вблизи аэропортов, вертолётных площадок и воздушных трасс
  • Уступай дорогу пилотируемым судам — они тебя не видят
  • Не управляй дроном в состоянии алкогольного или иного опьянения

  *⚙️ Технические правила:*
  • Не превышай разрешённую высоту полёта (уточняй у регулятора)
  • Возвращай дрон при заряде 20–30% — не жди критического разряда
  • При ветре более 8–10 м/с полёт не рекомендуется
  • Не летай в дождь, туман, снегопад — опасно для электроники

  *🚨 Нештатные ситуации:*
  • При потере ориентации — останови дрон, дай себе время разобраться
  • При нестабильном поведении — сажай немедленно
  • Знай, где кнопка аварийной остановки моторов на твоём пульте

  *🤝 Уважение к окружающим:*
  • Не снимай людей без их согласия — это затрагивает право на частную жизнь
  • Не летай над частной собственностью без разрешения владельца
  • Предупреждай прохожих при полётах в людных местах
