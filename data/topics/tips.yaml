id: tips
title: "💡 Советы новичкам"
body: |
  Начинаешь летать? Вот что поможет избежать типичных ошибок.

  *С чего начать:*
  • Начинай с недорогого дрона — учиться на ошибках дешевле
  • Первые полёты проводи в закрытом зале или на большой открытой площадке без людей
  • Используй симуляторы полёта (например, DJI Flight Simulator или Liftoff) — они отрабатывают рефлексы без риска разбить дрон
  • Читай инструкцию к своему устройству, не полагайся только на общие советы

  *Техника пилотирования:*
  • Отработай зависание на месте — это базовый навык
  • Двигай стиками плавно, не рывками
  • Тренируй полёт «на себя» — когда дрон летит к тебе, лево и право меняются местами
  • Снижай скорость в незнакомых местах

  *Психология пилота:*
  • Потерял ориентацию — останови дрон, возьми паузу
  • Лучше посадить дрон, чем рисковать аварией
  • Усталость и спешка — главные враги безопасного полёта
  • Не летай в плохом настроении или при сильном стрессе

  *Обслуживание:*
  • После каждого полёта осматривай пропеллеры на повреждения
  • Храни LiPo-аккумуляторы при заряде 40–60% для длительного хранения
  • Не заряжай аккумуляторы сразу после полёта — дай им остыть 15–20 минут
  • Читай Release Notes перед обновлением прошивки
