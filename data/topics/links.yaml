id: links
title: "🔗 Полезные ссылки"
disclaimer: "Ссылки справочные. Бот не несёт ответственности за содержимое внешних ресурсов и не гарантирует их актуальность. Всегда проверяй информацию на официальных сайтах."
body: |
  *Официальные источники (Россия):*
  • [Росавиация](https://favt.gov.ru) — регулятор гражданской авиации, правила использования БВС
  • [Госуслуги — учёт БВС](https://www.gosuslugi.ru) — постановка беспилотника на государственный учёт (ищи услугу «Учёт БВС»)

  *Международные:*
  • [ИКАО](https://www.icao.int) — международные стандарты и рекомендации по БВС

  *Карты и зоны:*
  • [DJI Fly Safe](https://www.dji.com/flysafe) — карта геозон для дронов DJI (не заменяет официальную карту регулятора)
  • [Airmap](https://www.airmap.com) — международный сервис планирования полётов (проверяй актуальность для своего региона)

  *Погода и ветер:*
  • [Windy](https://www.windy.com) — детализированный прогноз ветра и погоды на нужной высоте

  _Все ссылки — отправные точки для самостоятельной проверки. Перед полётом сверяй актуальные требования непосредственно у регулятора._
