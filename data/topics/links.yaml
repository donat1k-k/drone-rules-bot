body: |
  *🇷🇺 Официальные источники (Россия):*
  • [Росавиация](https://favt.gov.ru) — регулятор гражданской авиации, правила использования БВС
  • [Госуслуги](https://www.gosuslugi.ru) — постановка дрона на государственный учёт (ищи услугу «Учёт БВС»)
  • Небосвод — сервис планирования и согласования полётов БВС _(найди в браузере «Небосвод дроны»)_

  *🌐 Международные:*
  • [ИКАО](https://www.icao.int) — международные стандарты и рекомендации по БВС

  *🗺 Карты и зоны:*
  • [DJI Fly Safe](https://www.dji.com/flysafe) — карта геозон для дронов DJI _(не заменяет официальную карту регулятора)_

  *🌤 Погода и ветер:*
  • [Windy](https://www.windy.com) — детализированный прогноз ветра и погоды на нужной высоте
  • [Open-Meteo](https://open-meteo.com) — данные используются в функции «🌦 Погода для полёта» этого бота

  _Все ссылки — отправные точки для проверки. Перед полётом сверяй актуальные требования непосредственно у регулятора._
