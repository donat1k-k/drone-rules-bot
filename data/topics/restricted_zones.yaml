body: |
  Существуют зоны, где полёты беспилотников запрещены или требуют специального разрешения. Нарушение может повлечь штраф, конфискацию дрона или уголовную ответственность.

  *🚷 Типичные запрещённые зоны:*
  • Аэропорты и аэродромы — ограничения на несколько км вокруг
  • Вертолётные площадки
  • Государственные границы и пограничные зоны
  • Органы государственной власти (правительственные здания)
  • Военные и режимные объекты
  • Объекты критической инфраструктуры (АЭС, крупные плотины, нефтепроводы)
  • Места массовых мероприятий (часто временные запреты)
  • Национальные парки и заповедники (требуется разрешение администрации)

  *🗺 Где проверить зону перед полётом:*
  ⚠️ Бот не определяет запретные зоны — всегда проверяй вручную перед каждым вылетом:
  • [Росавиация](https://favt.gov.ru) — официальный регулятор гражданской авиации РФ
  • Небосвод — официальный сервис планирования и согласования полётов БВС _(найди в браузере «Небосвод дроны»)_
  • [DJI Fly Safe](https://www.dji.com/flysafe) — карта геозон для устройств DJI _(вспомогательный, не официальный источник РФ)_

  *⏰ Временные ограничения (NOTAM):*
  Полёты могут быть временно запрещены из-за государственных мероприятий, военных учений или иных причин. Проверяй NOTAM перед каждым вылетом.

  *⚠️ Ответственность:*
  Незнание о запрете не освобождает от ответственности. Всегда проверяй перед полётом.
disclaimer: "Информация справочная. Зоны и ограничения меняются. Бот не определяет разрешённость полёта. Перед каждым полётом проверяй актуальные запреты на официальных ресурсах."
