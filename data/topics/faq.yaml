id: faq
title: "❓ FAQ — частые вопросы"
disclaimer: "Ответы носят справочный характер. Законодательство и технические требования меняются — сверяй актуальную информацию с официальными источниками."
body: |
  ❓ *Нужно ли регистрировать дрон?*
  Зависит от массы и страны. В России дроны тяжелее 250 г подлежат постановке на государственный учёт через Госуслуги. Уточни пороговые значения на сайте Росавиации, так как требования могут меняться.

  ❓ *Нужно ли разрешение на полёт?*
  В большинстве случаев любительские полёты в неконтролируемом воздушном пространстве вне запретных зон не требуют отдельного разрешения. Однако в ряде зон требуется подача плана полёта или уведомление. Всегда проверяй карту перед вылетом.

  ❓ *На какой высоте можно летать?*
  Для большинства любительских беспилотников действует ограничение 150 м над уровнем земли (в России, вне контролируемого воздушного пространства). В ряде зон ограничения строже или полёты запрещены. Уточняй у регулятора своей страны.

  ❓ *Можно ли снимать людей с дрона?*
  Съёмка людей без их согласия может нарушать законодательство о персональных данных и праве на частную жизнь. В общественных местах правила различаются. Лучше получать согласие или снимать так, чтобы люди не были идентифицируемы.

  ❓ *Что делать, если дрон упал на чужую территорию?*
  Не проникай на частную территорию без разрешения. Попробуй связаться с владельцем. При необходимости обратись за помощью в соответствующие службы. Сохрани данные телеметрии.

  ❓ *Нужна ли страховка?*
  В ряде стран страхование гражданской ответственности обязательно, в других — рекомендовано. Без страховки ущерб третьим лицам возмещается из собственных средств. Уточни требования в своей стране.

  ❓ *Можно ли летать ночью?*
  Во многих странах ночные полёты разрешены при соблюдении дополнительных условий: наличие навигационных огней, сохранение визуального контроля. Уточни правила у регулятора — они существенно различаются.
