body: |
  ❓ *Нужно ли регистрировать дрон?*
  Зависит от массы. В России дроны тяжелее 250 г подлежат государственному учёту через Госуслуги. После регистрации присваивается учётный номер, который наносится на корпус. Уточняй актуальные требования — они могут меняться.

  ❓ *Нужно ли разрешение на полёт?*
  Для большинства любительских полётов в неконтролируемом воздушном пространстве вне запретных зон отдельного разрешения не требуется. В ряде зон нужна подача плана полёта или уведомление органов управления воздушным движением. Проверяй карту перед каждым вылетом.

  ❓ *На какой высоте можно летать?*
  В России для большинства любительских дронов действует ограничение 150 м над уровнем земли. В ряде зон лимит ниже или полёты полностью запрещены. Уточни актуальные ограничения на сайте Росавиации.

  ❓ *Можно ли снимать людей с дрона?*
  Съёмка людей без их согласия может нарушать законодательство о персональных данных и праве на частную жизнь. Рекомендуем запрашивать согласие или снимать так, чтобы люди не были идентифицируемы.

  ❓ *Что делать, если дрон упал на чужую территорию?*
  Не проникай на частную территорию без разрешения. Попробуй связаться с владельцем. При необходимости обратись за помощью в соответствующие службы. Сохрани данные телеметрии.

  ❓ *Нужна ли страховка?*
  В ряде стран страхование гражданской ответственности обязательно. В России пока рекомендовано для любителей — уточняй актуальные требования. Без страховки ущерб третьим лицам возмещается из собственных средств.

  ❓ *Можно ли летать ночью?*
  Во многих странах ночные полёты разрешены при соблюдении дополнительных условий: навигационные огни, визуальный контроль дрона. Уточни правила у Росавиации — они могут меняться.

  ❓ *Что делать при аварии или столкновении?*
  Зафиксируй место и обстоятельства. Если причинён ущерб людям или имуществу — вызови экстренные службы, оформи факт инцидента. Сохрани телеметрию и видеозапись. Обратись к страховщику при наличии полиса. Ответственность за ущерб лежит на пилоте.

  ❓ *Можно ли летать за городом и в поле?*
  В большинстве случаев — да, если зона не ограничена. За городом тоже бывают запрещённые зоны: военные объекты, заповедники, пограничные территории. Перед полётом всегда проверяй карту воздушного пространства.

  ❓ *Можно ли летать над частными домами и участками?*
  Технически возможно, но это затрагивает право на частную жизнь и право собственности. Съёмка без согласия владельца может нарушать законодательство. Рекомендуем избегать полётов над чужими участками без разрешения.

  ❓ *Нужны ли «права» или экзамен для управления дроном?*
  Для любительских полётов специального удостоверения, как правило, не требуется. Для коммерческого применения требования строже. Уточни актуальные правила на сайте Росавиации (favt.gov.ru).
