body: |
  Правильная подготовка — залог безопасного полёта. Проверяй каждый пункт перед вылетом.

  *✅ Техническая проверка:*
  • Заряд аккумулятора дрона и пульта — не менее 80%
  • Пропеллеры целые, без трещин и сколов, надёжно закреплены
  • Камера и подвес (при наличии) — без повреждений
  • Карта памяти установлена, свободного места достаточно

  *🌤 Место и погода:*
  • Убедись, что зона не является запрещённой или ограниченной
  • Проверь прогноз: ветер до 8 м/с, без осадков
  • Оцени помехи сигналу: ЛЭП, металлоконструкции, высотные здания
  • Найди ровную открытую площадку для взлёта и посадки

  *⚙️ Настройки перед взлётом:*
  • Подключи пульт, убедись в устойчивой связи с дроном
  • Выполни калибровку компаса в новом месте
  • Дождись захвата GPS — не менее 6 спутников для стабильного полёта
  • Проверь и установи точку возврата (Home Point)
  • Задай высоту Return to Home выше всех препятствий в зоне полёта

  *📄 Документы:*
  • При необходимости уведоми органы управления воздушным движением
  • Держи при себе документы на дрон (паспорт изделия, свидетельство об учёте при наличии)
